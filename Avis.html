<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnswerAI — Avis récents</title>
<link rel="stylesheet" href="assets/base.css">
<link rel="stylesheet" href="assets/dashboard.css">
<style>
.filter-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
.filter-bar .search { position: relative; margin-left: auto; }
.filter-bar .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-4); }
.filter-bar .search input { padding-left: 36px; width: 230px; }
.filter-divider { width: 1px; height: 24px; background: var(--line); margin: 0 4px; }

.content { container-type: inline-size; }
.rvf { display: grid; grid-template-columns: 210px minmax(0,1fr) 300px; gap: 0; border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; background: #fff; box-shadow: var(--shadow-sm); transition: box-shadow .15s; }
.rvf + .rvf { margin-top: 16px; }
.rvf:hover { box-shadow: var(--shadow); }
.rvf.sel { box-shadow: 0 0 0 2px var(--indigo); }
.rvf-check { width: 18px; height: 18px; border: 1.5px solid var(--line-strong); border-radius: 5px; cursor: pointer; flex-shrink: 0; display: grid; place-items: center; transition: .12s; }
.rvf-check.on { background: var(--indigo); border-color: var(--indigo); }
.rvf-check svg { opacity: 0; width: 12px; height: 12px; }
.rvf-check.on svg { opacity: 1; }
.rvf-left { padding: 18px; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; }
.rvf-center { padding: 18px; }
.rvf-text { font-size: 14.5px; color: var(--ink); line-height: 1.6; }
.rvf-right { padding: 18px; background: var(--indigo-50); border-left: 1px solid var(--indigo-100); display: flex; flex-direction: column; }
.tone-sel { display: flex; gap: 6px; margin: 12px 0; }
.tone { padding: 6px 11px; border-radius: 8px; font-size: 12.5px; font-weight: 600; border: 1px solid var(--indigo-100); background: #fff; color: var(--ink-3); transition: .12s; }
.tone.on { background: var(--indigo); color: #fff; border-color: var(--indigo); }
.rvf-resp-txt { font-size: 13.5px; color: var(--ink-2); line-height: 1.55; background: #fff; border: 1px solid var(--indigo-100); border-radius: 8px; padding: 11px; }

.bulk-bar { position: sticky; bottom: 18px; z-index: 20; background: var(--navy); color: #fff; border-radius: var(--r); padding: 13px 18px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-lg); margin-top: 20px; transform: translateY(120%); opacity: 0; transition: .25s; }
.bulk-bar.show { transform: none; opacity: 1; }
.bulk-bar .cnt { font-weight: 700; }

@container (max-width: 820px) {
  .rvf { grid-template-columns: 1fr; }
  .rvf-left, .rvf-right { border: none; border-top: 1px solid var(--line); }
  .rvf-left { border-top: none; }
}
</style>
</head>
<body data-page="avis" data-title="Avis récents">
<div class="app">
  <div class="main">
    <div class="content">
      <div class="page-head">
        <h1>Avis récents</h1>
        <p class="desc" id="pageDesc">Tous les avis Google, traités par AnswerAI.</p>
      </div>

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <button class="chip active" data-filter="all">Tous</button>
        <button class="chip" data-filter="todo">À traiter</button>
        <button class="chip" data-filter="done">Répondus</button>
        <span class="filter-divider"></span>
        <button class="chip" data-filter="1">1★</button>
        <button class="chip" data-filter="2">2★</button>
        <button class="chip" data-filter="3">3★</button>
        <button class="chip" data-filter="4">4★</button>
        <button class="chip" data-filter="5">5★</button>
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input class="input" type="text" id="searchInput" placeholder="Rechercher un avis…">
        </div>
      </div>

      <div id="feed"><p style="color:var(--ink-4);font-size:14px">Chargement…</p></div>

      <!-- bulk bar -->
      <div class="bulk-bar" id="bulkBar">
        <span class="cnt"><span id="bulkCount">0</span> avis sélectionnés</span>
        <button class="btn btn-green btn-sm" style="margin-left:auto" id="bulkApprove">✓ Approuver les réponses sélectionnées</button>
        <button class="btn btn-ghost btn-sm" id="bulkClear">Annuler</button>
      </div>
    </div>
  </div>
</div>

<script src="assets/ui.js"></script>
<script src="assets/api.js"></script>
<script src="assets/shell.js"></script>
<script>
const TONES = [
  { key: 'professionnel', label: 'Professionnel' },
  { key: 'chaleureux', label: 'Chaleureux' },
  { key: 'formel', label: 'Formel' },
];

let REVIEWS = [];

function starsHtml(n) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += `<svg viewBox="0 0 24 24" width="15" height="15"><path d="M12 2l2.9 6.3 6.9.6-5.2 4.6 1.6 6.7L12 17.3 5.8 20.8l1.6-6.7L2.2 9.5l6.9-.6L12 2z" fill="${i<=n?'var(--amber)':'#DfE2E8'}"/></svg>`;
  return s;
}
function timeAgo(iso) {
  if (!iso) return '';
  const h = Math.floor((Date.now() - new Date(iso).getTime()) / 3600000);
  if (h < 1) return "à l'instant";
  if (h < 24) return `il y a ${h} h`;
  return `il y a ${Math.floor(h / 24)} j`;
}
function statusPill(r) {
  if (r.status === 'sent') return '<span class="pill pill-green">Répondu par AnswerAI</span>';
  if (r.ai_response) return '<span class="pill pill-amber">En attente d\'approbation</span>';
  return '<span class="pill pill-red">À traiter</span>';
}

function rightPanel(r) {
  if (r.status === 'sent') {
    return `<div class="rvf-right">
      <span class="pill pill-green" style="align-self:flex-start">Répondu par AnswerAI</span>
      <p class="rvf-resp-txt" style="margin-top:12px;flex:1">${r.ai_response || ''}</p>
    </div>`;
  }
  if (!r.ai_response) {
    return `<div class="rvf-right" data-id="${r.id}">
      <p style="font-size:13.5px;color:var(--ink-3);flex:1">Pas encore de réponse générée.</p>
      <button class="btn btn-primary btn-sm js-generate">Générer une réponse IA</button>
    </div>`;
  }
  return `<div class="rvf-right" data-id="${r.id}">
    <div style="font-size:11.5px;font-weight:700;color:var(--indigo-600);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:7px;"><span class="dot" style="background:var(--indigo)"></span> Réponse IA suggérée</div>
    <textarea class="textarea js-resp" style="margin-top:10px;flex:1;min-height:110px;background:#fff">${r.ai_response}</textarea>
    <div class="tone-sel">
      ${TONES.map(t => `<button class="tone" data-tone="${t.key}">${t.label}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost-dark btn-sm js-regen"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Régénérer</button>
      <button class="btn btn-primary btn-sm js-send" style="flex:1">Approuver et envoyer</button>
    </div>
  </div>`;
}

function card(r) {
  const initial = (r.author_name || '?').charAt(0).toUpperCase();
  const isTodo = r.status !== 'sent';
  return `<div class="rvf" data-id="${r.id}" data-status="${isTodo ? 'todo' : 'done'}" data-stars="${r.rating}">
    <div class="rvf-left">
      <div class="rvf-who" style="display:flex;align-items:center;gap:11px">
        ${isTodo && r.ai_response ? `<div class="rvf-check js-check"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>` : ''}
        <span class="avatar" style="background:#4F46E5">${initial}</span>
        <div><div class="rvf-name" style="font-weight:650;font-size:14px">${r.author_name || 'Client'}</div><div class="rv-meta">${timeAgo(r.time)}</div></div>
      </div>
      <div class="stars">${starsHtml(r.rating)}</div>
      <div>${statusPill(r)}</div>
    </div>
    <div class="rvf-center"><p class="rvf-text">${r.text || ''}</p></div>
    ${rightPanel(r)}
  </div>`;
}

const feed = document.getElementById('feed');
function filtered() {
  let list = REVIEWS;
  if (activeFilter === 'todo') list = list.filter(r => r.status !== 'sent');
  else if (activeFilter === 'done') list = list.filter(r => r.status === 'sent');
  else if (['1','2','3','4','5'].includes(activeFilter)) list = list.filter(r => r.rating === +activeFilter);
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) list = list.filter(r => (r.text || '').toLowerCase().includes(q) || (r.author_name || '').toLowerCase().includes(q));
  return list;
}
function render() {
  const list = filtered();
  feed.innerHTML = list.length ? list.map(card).join('') : '<p style="color:var(--ink-4);font-size:14px">Aucun avis ne correspond.</p>';
}

async function load() {
  try {
    const data = await window.AnswerAPI.get('reviews');
    REVIEWS = data.reviews || [];
    const estabName = window.AnswerUser?.establishment_name || '';
    document.getElementById('pageDesc').textContent = estabName ? `Tous les avis Google de ${estabName}, traités par AnswerAI.` : 'Tous les avis Google, traités par AnswerAI.';
    render();
  } catch (e) {}
}
document.addEventListener('shell:ready', load);

let activeFilter = 'all';
document.querySelector('.filter-bar').addEventListener('click', e => {
  const chip = e.target.closest('.chip'); if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter = chip.dataset.filter;
  selected.clear(); updateBulk(); render();
});
document.getElementById('searchInput').addEventListener('input', render);

const selected = new Set();
const bulkBar = document.getElementById('bulkBar');
function updateBulk() {
  document.getElementById('bulkCount').textContent = selected.size;
  bulkBar.classList.toggle('show', selected.size > 0);
}

feed.addEventListener('click', async (e) => {
  const check = e.target.closest('.js-check');
  if (check) {
    const cardEl = check.closest('.rvf'); const id = cardEl.dataset.id;
    check.classList.toggle('on'); cardEl.classList.toggle('sel', check.classList.contains('on'));
    if (check.classList.contains('on')) selected.add(id); else selected.delete(id);
    updateBulk(); return;
  }

  const tone = e.target.closest('.tone');
  if (tone) {
    const panel = tone.closest('.rvf-right'); const id = panel.dataset.id;
    panel.querySelectorAll('.tone').forEach(t => t.classList.remove('on')); tone.classList.add('on');
    const ta = panel.querySelector('.js-resp'); const orig = ta.value;
    ta.disabled = true; ta.value = 'Génération en cours…';
    try {
      const res = await window.AnswerAPI.post('generate', { reviewId: id, tone: tone.dataset.tone });
      ta.value = res.response;
      const r = REVIEWS.find(x => x.id === id); if (r) r.ai_response = res.response;
    } catch (err) { ta.value = orig; }
    ta.disabled = false;
    return;
  }

  const regen = e.target.closest('.js-regen');
  if (regen) {
    const panel = regen.closest('.rvf-right'); const id = panel.dataset.id;
    const ta = panel.querySelector('.js-resp'); const orig = ta.value;
    const activeTone = panel.querySelector('.tone.on');
    ta.value = 'Régénération en cours…'; ta.disabled = true;
    try {
      const res = await window.AnswerAPI.post('generate', { reviewId: id, tone: activeTone?.dataset.tone });
      ta.value = res.response;
      const r = REVIEWS.find(x => x.id === id); if (r) r.ai_response = res.response;
    } catch (err) { ta.value = orig; }
    ta.disabled = false;
    return;
  }

  const send = e.target.closest('.js-send');
  if (send) {
    const panel = send.closest('.rvf-right'); const id = panel.dataset.id;
    const ta = panel.querySelector('.js-resp');
    send.disabled = true; send.textContent = 'Envoi…';
    try {
      await window.AnswerAPI.post('approve', { reviewId: id, response: ta.value });
      const r = REVIEWS.find(x => x.id === id); if (r) { r.status = 'sent'; r.ai_response = ta.value; }
      render();
    } catch (err) { send.disabled = false; send.textContent = 'Approuver et envoyer'; }
    return;
  }

  const generate = e.target.closest('.js-generate');
  if (generate) {
    const panel = generate.closest('.rvf-right'); const id = panel.dataset.id;
    generate.disabled = true; generate.textContent = 'Génération…';
    try {
      const res = await window.AnswerAPI.post('generate', { reviewId: id });
      const r = REVIEWS.find(x => x.id === id); if (r) r.ai_response = res.response;
      render();
    } catch (err) { generate.disabled = false; generate.textContent = 'Générer une réponse IA'; }
    return;
  }
});

document.getElementById('bulkApprove').addEventListener('click', async () => {
  const ids = [...selected];
  for (const id of ids) {
    const cardEl = feed.querySelector(`.rvf[data-id="${id}"]`);
    const ta = cardEl?.querySelector('.js-resp');
    try {
      await window.AnswerAPI.post('approve', { reviewId: id, response: ta ? ta.value : undefined });
      const r = REVIEWS.find(x => x.id === id); if (r) r.status = 'sent';
    } catch (err) {}
  }
  selected.clear(); updateBulk(); render();
});
document.getElementById('bulkClear').addEventListener('click', () => { selected.clear(); updateBulk(); render(); });
</script>
</body>
</html>
